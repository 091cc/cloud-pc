<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud WebOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .desktop {
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
        }
        .window {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="h-screen overflow-hidden desktop flex flex-col font-sans text-white">

    <div class="flex-grow p-6 grid grid-cols-1 gap-4 w-24 text-center">
        <div class="cursor-pointer hover:bg-white/10 p-2 rounded" onclick="toggleWindow('roblox-win')">
            <img src="https://www.roblox.com/favicon.ico" class="w-12 h-12 mx-auto mb-1">
            <span class="text-xs shadow-sm">Roblox</span>
        </div>
        <div class="cursor-pointer hover:bg-white/10 p-2 rounded" onclick="toggleWindow('term-win')">
            <img src="https://cdn-icons-png.flaticon.com/512/906/906324.png" class="w-12 h-12 mx-auto mb-1">
            <span class="text-xs shadow-sm">Terminal</span>
        </div>
    </div>

    <div id="roblox-win" class="hidden absolute top-20 left-1/4 w-1/2 h-3/5 window border border-white/30 rounded-lg shadow-2xl flex flex-col">
        <div class="p-2 bg-black/40 flex justify-between items-center rounded-t-lg">
            <span class="text-sm font-bold">Roblox Player (Cloud)</span>
            <button onclick="toggleWindow('roblox-win')" class="text-red-400 hover:text-red-600 font-bold px-2">✕</button>
        </div>
        <div class="flex-grow">
            <iframe src="https://now.gg/play/roblox-corporation/5349/roblox" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <div class="h-12 bg-black/60 backdrop-blur-md flex items-center px-4 justify-between border-t border-white/10">
        <div class="flex items-center space-x-4">
            <div class="font-bold text-blue-400">Start</div>
            <div class="text-xs opacity-60 px-2 border-l border-white/20 italic">904 Station</div>
        </div>
        <div id="clock" class="text-sm font-mono"></div>
    </div>

    <script>
        function toggleWindow(id) {
            const win = document.getElementById(id);
            win.classList.toggle('hidden');
        }

        // 更新時間
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
